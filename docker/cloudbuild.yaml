steps:
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'build'
      - '-f'
      - 'docker/backend-native.Dockerfile'
      - '-t'
      - 'us-central1-docker.pkg.dev/$PROJECT_ID/trading-journal/backend-native:$_TAG'
      - '.'

  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'push'
      - 'us-central1-docker.pkg.dev/$PROJECT_ID/trading-journal/backend-native:$_TAG'

  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'build'
      - '-f'
      - 'docker/frontend.Dockerfile'
      - '-t'
      - 'us-central1-docker.pkg.dev/$PROJECT_ID/trading-journal/frontend:$_TAG'
      - '.'

  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'push'
      - 'us-central1-docker.pkg.dev/$PROJECT_ID/trading-journal/frontend:$_TAG'

images:
  - 'us-central1-docker.pkg.dev/$PROJECT_ID/trading-journal/backend-native:$_TAG'
  - 'us-central1-docker.pkg.dev/$PROJECT_ID/trading-journal/frontend:$_TAG'

options:
  machineType: 'E2_HIGHCPU_8'
  diskSizeGb: '100'

substitutions:
  _TAG: 'latest'